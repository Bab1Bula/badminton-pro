<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <title>羽球 Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2646/2646434.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2646/2646434.png">

    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; display: flex; flex-direction: column; overflow: hidden; }

        /* 极致放大触控区 */
        .court { display: flex; flex: 1; width: 100%; position: relative; padding-top: env(safe-area-inset-top); }
        .court::after { content: ''; position: absolute; top: 20px; bottom: 20px; left: 50%; width: 2px; background: rgba(255,255,255,0.1); transform: translateX(-50%); }
        .side { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: all 0.1s ease; position: relative; z-index: 1; }
        .side:active .score { transform: scale(1.1); transition: all 0.1s ease; }
        .side:active { background: rgba(255,255,255,0.02); }

        .name { font-size: 32px; margin-bottom: 20px; color: #94a3b8; font-weight: 600; }
        .score { font-size: 140px; font-weight: 800; line-height: 1; text-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: all 0.2s; }

        .serve-indicator { width: 16px; height: 16px; background-color: #10b981; border-radius: 50%; margin-top: 30px; opacity: 0.1; transition: all 0.3s ease; }
        .has-serve .serve-indicator { opacity: 1; box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); transform: scale(1.2); }

        .controls-panel { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 15px; }
        .panel-title { text-align: center; font-size: 16px; color: #64748b; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .panel-title img { width: 20px; height: 20px; opacity: 0.8; }
        .buttons-row { display: flex; gap: 15px; }
        button { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 16px 0; border-radius: 14px; font-size: 17px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:active { background: rgba(255,255,255,0.15); transform: scale(0.98); }
        .btn-undo { color: #e2e8f0; }
        .btn-reset { color: #ef4444; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); }

        /* 官方倒计时弹窗样式 */
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 100; }
        .modal-content { background: #1e293b; padding: 35px 25px; border-radius: 24px; text-align: center; width: 85%; max-width: 340px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        #modal h2 { color: #38bdf8; font-size: 28px; margin: 0 0 15px 0; }
        #modal p { color: #94a3b8; font-size: 18px; margin-bottom: 25px; line-height: 1.5; white-space: pre-line; }
        #modal button { background: #38bdf8; color: #0f172a; border: none; padding: 16px; width: 100%; font-size: 18px; font-weight: 700; border-radius: 12px; }
        #modal button:active { background: #0ea5e9; }
    </style>
</head>
<body>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title">胜出比赛!</h2>
            <p id="modal-desc">比赛结束</p>
            <button onclick="handleModalClick()" id="modal-btn">重新开始</button>
        </div>
    </div>

    <div class="court">
        <div class="side has-serve" id="area-l" onclick="addScore('l')">
            <div class="name">Castor</div>
            <div id="score-l" class="score">0</div>
            <div class="serve-indicator"></div>
        </div>
        <div class="side" id="area-r" onclick="addScore('r')">
            <div class="name">Opponent</div>
            <div id="score-r" class="score">0</div>
            <div class="serve-indicator"></div>
        </div>
    </div>

    <div class="controls-panel">
        <div class="panel-title">
            <img src="https://cdn-icons-png.flaticon.com/512/2646/2646434.png" alt="羽毛球">
            羽球 Pro
        </div>
        <div class="buttons-row">
            <button class="btn-undo" onclick="undo()">↩ 撤销</button>
            <button class="btn-reset" onclick="confirmReset()">✖ 重置</button>
        </div>
    </div>

    <script>
        let state = {
            s: { l: 0, r: 0 },
            serve: 'l',
            history: [],
            matchOver: false,
            breakTaken: false // 记录是否已经休息过
        };

        let breakTimer = null;

        function vibrate(pattern = 50) { if (navigator.vibrate) navigator.vibrate(pattern); }

        function addScore(player) {
            if (state.matchOver) return;
            vibrate();
            
            // 保存比分、发球权和休息状态用于撤销
            state.history.push({ 
                s: { l: state.s.l, r: state.s.r }, 
                serve: state.serve, 
                breakTaken: state.breakTaken 
            });
            
            state.s[player]++;
            state.serve = player;
            updateUI();
            checkRules();
        }

        function undo() {
            if (state.history.length > 0) {
                vibrate(30);
                let lastState = state.history.pop();
                state.s = lastState.s;
                state.serve = lastState.serve;
                state.breakTaken = lastState.breakTaken;
                updateUI();
            }
        }

        function checkRules() {
            let winL = (state.s.l >= 21 && state.s.l - state.s.r >= 2) || state.s.l === 30;
            let winR = (state.s.r >= 21 && state.s.r - state.s.l >= 2) || state.s.r === 30;
            
            if (winL || winR) {
                vibrate([100, 50, 100]);
                state.matchOver = true;
                let winnerName = winL ? "Castor" : "Opponent";
                showModal("🏆 " + winnerName + " 获胜!", "单局比赛结束", "重新开始", "reset");
            } 
            // 官方11分饮水休息逻辑 (只在第一次达到时触发)
            else if ((state.s.l === 11 || state.s.r === 11) && !state.breakTaken) {
                state.breakTaken = true; // 标记已休息，确保跳过后不再触发
                vibrate([50, 50, 50]);
                startWaterBreak();
            }
        }

        function startWaterBreak() {
            let timeLeft = 60; // BWF 官方60秒休息
            document.getElementById('modal-title').innerText = "⏱ 饮水休息 (Water Break)";
            document.getElementById('modal-desc').innerText = `请擦汗并交换场地。\n倒计时: ${timeLeft} 秒`;
            document.getElementById('modal-btn').innerText = "跳过休息 (Skip)";
            document.getElementById('modal-btn').dataset.action = 'continue';
            document.getElementById('modal').style.display = 'flex';

            clearInterval(breakTimer); // 确保没有多余的定时器
            breakTimer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    document.getElementById('modal-desc').innerText = `请擦汗并交换场地。\n倒计时: ${timeLeft} 秒`;
                } else {
                    clearInterval(breakTimer);
                    document.getElementById('modal-desc').innerText = "休息结束，比赛继续！";
                    document.getElementById('modal-btn').innerText = "继续比赛";
                }
            }, 1000);
        }

        function updateUI() {
            document.getElementById('score-l').innerText = state.s.l;
            document.getElementById('score-r').innerText = state.s.r;
            document.getElementById('area-l').classList.toggle('has-serve', state.serve === 'l');
            document.getElementById('area-r').classList.toggle('has-serve', state.serve === 'r');
        }

        function showModal(title, desc, btnText, actionType) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            const btn = document.getElementById('modal-btn');
            btn.innerText = btnText;
            btn.dataset.action = actionType;
            document.getElementById('modal').style.display = 'flex';
        }

        function handleModalClick() {
            const action = document.getElementById('modal-btn').dataset.action;
            if (action === 'reset') {
                resetMatch();
            } else if (action === 'continue') {
                clearInterval(breakTimer); // 点击继续时清除定时器
                document.getElementById('modal').style.display = 'none'; // 隐藏弹窗，比分不重置
            }
        }

        function confirmReset() {
            vibrate(30);
            if (confirm("确定要清空当前比分，重新开始吗？")) {
                resetMatch();
            }
        }

        function resetMatch() {
            clearInterval(breakTimer);
            state = { s: { l: 0, r: 0 }, serve: 'l', history: [], matchOver: false, breakTaken: false };
            document.getElementById('modal').style.display = 'none';
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
